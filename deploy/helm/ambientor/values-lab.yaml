# Lab / kind overrides — local images, no GHCR pull (see docs/runbook-lab.md).
image:
  repository: ambientor
  tag: "0.1.0"
  pullPolicy: Never

postgresql:
  enabled: true
  auth:
    username: ambientor
    password: ambientor-lab
    database: ambientor
  primary:
    persistence:
      enabled: false

operator:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi

api:
  env:
    AMBIENTOR_JWT_SECRET: "lab-only-change-me"

web:
  env:
    AMBIENTOR_API_URL: "http://ambientor-api:8080"
