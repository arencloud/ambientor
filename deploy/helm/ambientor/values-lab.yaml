# Local kind lab / CI e2e: images loaded via `kind load docker-image`.
image:
  registry: ""
  tag: "0.1.4"
  pullPolicy: Never

operator:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 512Mi

api:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi

web:
  resources:
    requests:
      cpu: 25m
      memory: 32Mi

postgresql:
  enabled: true
  auth:
    username: ambientor
    password: ambientor
    database: ambientor
  primary:
    persistence:
      enabled: false
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
