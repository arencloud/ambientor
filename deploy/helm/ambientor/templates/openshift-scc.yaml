{{- /*
Bind the bundled Postgres ServiceAccount to anyuid SCC on OpenShift.

This is gated by API discovery so it does not impact vanilla Kubernetes clusters.
*/ -}}
{{- if and (.Capabilities.APIVersions.Has "security.openshift.io/v1") .Values.postgresql.enabled -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "ambientor.fullname" . }}-postgresql-anyuid
  namespace: {{ .Values.namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:openshift:scc:anyuid
subjects:
  - kind: ServiceAccount
    name: {{ .Release.Name }}-postgresql
    namespace: {{ .Values.namespace }}
{{- end -}}

