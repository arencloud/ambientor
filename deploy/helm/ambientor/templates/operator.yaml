apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ambientor.fullname" . }}-operator
  namespace: {{ .Values.namespace }}
  labels:
    app: ambientor-operator
spec:
  replicas: {{ .Values.operator.replicas }}
  selector:
    matchLabels:
      app: ambientor-operator
  template:
    metadata:
      labels:
        app: ambientor-operator
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      containers:
        - name: operator
          image: {{ include "ambientor.imageRef" (dict "root" . "component" "operator") }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            {{- with include "ambientor.databaseUrl" . | trim }}
            - name: DATABASE_URL
              value: {{ . | quote }}
            {{- end }}
            {{- range $k, $v := .Values.operator.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
          resources:
            {{- toYaml .Values.operator.resources | nindent 12 }}
