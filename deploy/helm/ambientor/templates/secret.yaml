{{- if and .Values.auth.createSecret (not .Values.auth.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ambientor.auth.secretName" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "ambientor.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  jwt-secret: {{ required "auth.jwtSecret is required when auth.createSecret is true (use auth.existingSecret for external secrets)" .Values.auth.jwtSecret | quote }}
  {{- if .Values.auth.oidc.clientSecret }}
  oidc-client-secret: {{ .Values.auth.oidc.clientSecret | quote }}
  {{- end }}
{{- end }}
