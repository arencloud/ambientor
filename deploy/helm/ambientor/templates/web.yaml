apiVersion: v1
kind: Service
metadata:
  name: ambientor-web
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "ambientor.labels" . | nindent 4 }}
spec:
  selector:
    app: ambientor-web
  ports:
    - port: {{ .Values.web.service.port }}
      targetPort: 3000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ambientor.fullname" . }}-web
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "ambientor.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.web.replicas }}
  selector:
    matchLabels:
      app: ambientor-web
  template:
    metadata:
      labels:
        app: ambientor-web
    spec:
      containers:
        - name: web
          image: {{ include "ambientor.imageRef" (dict "root" . "component" "web") }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: AMBIENTOR_WEB_ADDR
              value: {{ .Values.web.env.AMBIENTOR_WEB_ADDR | quote }}
            - name: AMBIENTOR_API_URL
              value: {{ include "ambientor.webApiUrl" . | quote }}
          {{- if .Values.probes.web.enabled }}
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.web.liveness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.web.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.web.liveness.periodSeconds }}
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.web.readiness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.web.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.web.readiness.periodSeconds }}
          {{- end }}
          resources:
            {{- toYaml .Values.web.resources | nindent 12 }}
