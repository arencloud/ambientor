apiVersion: v1
kind: Service
metadata:
  name: ambientor-api
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "ambientor.labels" . | nindent 4 }}
spec:
  selector:
    app: ambientor-api
  ports:
    - port: {{ .Values.api.service.port }}
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ambientor.fullname" . }}-api
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "ambientor.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      app: ambientor-api
  template:
    metadata:
      labels:
        app: ambientor-api
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      containers:
        - name: api
          image: {{ include "ambientor.imageRef" (dict "root" . "component" "api") }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8080
              name: http
          env:
            {{ include "ambientor.databaseUrlEnv" . | nindent 12 }}
            - name: AMBIENTOR_API_ADDR
              value: {{ .Values.api.env.AMBIENTOR_API_ADDR | quote }}
            {{ include "ambientor.apiJwtEnv" . | nindent 12 }}
            {{ include "ambientor.apiOidcEnv" . | nindent 12 }}
          {{- if .Values.probes.api.enabled }}
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.api.liveness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.api.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.api.liveness.periodSeconds }}
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.api.readiness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.api.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.api.readiness.periodSeconds }}
          {{- end }}
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
