# CI e2e on kind: no Postgres (faster, avoids Bitnami pull/startup timeouts).
image:
  registry: ""
  tag: "0.1.4"
  pullPolicy: Never

postgresql:
  enabled: false

auth:
  createSecret: false

probes:
  api:
    enabled: false
  web:
    enabled: false

operator:
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 500m
      memory: 512Mi

api:
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 500m
      memory: 256Mi

web:
  replicas: 0
  resources:
    requests:
      cpu: 25m
      memory: 32Mi
