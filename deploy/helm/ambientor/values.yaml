global:
  imageRegistry: ""

image:
  registry: quay.io/arencloud
  tag: "0.1.4"
  pullPolicy: IfNotPresent

namespace: ambientor-system

operator:
  replicas: 1
  image:
    # Optional override for dev images:
    # repository: quay.io/arencloud/ambientor-operator-dev
    # tag: dev-<git-sha>
    repository: ""
    tag: ""
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1536Mi
  env:
    # Live dashboard sync interval (seconds). Assessment persists snapshots; increase on large clusters.
    AMBIENTOR_DASHBOARD_SYNC_SECS: "120"

api:
  replicas: 1
  image:
    repository: ""
    tag: ""
  service:
    type: ClusterIP
    port: 8080
  env:
    AMBIENTOR_API_ADDR: "0.0.0.0:8080"
    # Prefer auth.jwtSecret / auth.createSecret; legacy inline JWT for lab only.
    AMBIENTOR_JWT_SECRET: ""
  resources:
    requests:
      cpu: 50m
      memory: 64Mi

web:
  replicas: 1
  image:
    repository: ""
    tag: ""
  service:
    type: ClusterIP
    port: 3000
  # External API URL for browser (portal config.js). Overrides cluster DNS when set.
  apiUrl: ""
  env:
    AMBIENTOR_WEB_ADDR: "0.0.0.0:3000"
    AMBIENTOR_API_URL: "http://ambientor-api:8080"

auth:
  # Create ambientor-secrets (jwt-secret, optional oidc-client-secret). Enable for P4/OIDC pilots.
  createSecret: false
  existingSecret: ""
  secretName: ambientor-secrets
  # Required when createSecret is true. Use a long random string in production.
  jwtSecret: ""
  oidc:
    enabled: false
    issuerUrl: ""
    clientId: ""
    redirectUri: ""
    clientSecret: ""
    scopes: "openid profile email"
    defaultRoles: "viewer"
    # Portal origin; IdP callback redirects here with ?token=
    successUrl: ""

probes:
  api:
    enabled: true
    liveness:
      path: /healthz
      initialDelaySeconds: 5
      periodSeconds: 15
    readiness:
      path: /readyz
      initialDelaySeconds: 3
      periodSeconds: 10
  web:
    enabled: true
    liveness:
      path: /
      initialDelaySeconds: 3
      periodSeconds: 15
    readiness:
      path: /
      initialDelaySeconds: 2
      periodSeconds: 10

ingress:
  enabled: false
  className: ""
  annotations: {}
  tls:
    enabled: true
    secretName: ""
  api:
    host: ""
  web:
    host: ""

openshift:
  # Browser-facing API URL when web runs separately from API (Route / gateway).
  apiUrl: ""
  routes:
    enabled: false
    api:
      host: ""
      tlsTermination: edge
    web:
      host: ""
      tlsTermination: edge

postgresql:
  enabled: true
  image:
    # OpenShift-friendly, rootless Postgres (RHEL image by default).
    # Override these if you mirror images internally.
    repository: registry.redhat.io/rhel9/postgresql-16
    tag: "latest"
    pullPolicy: IfNotPresent
  auth:
    username: ambientor
    password: ambientor
    database: ambientor
  primary:
    persistence:
      # When false, new installs use emptyDir (lab only). Existing PVC-backed StatefulSets
      # keep their volumeClaimTemplates on helm upgrade (immutable field).
      enabled: true
      size: 8Gi
      # Set before first install. Cannot be changed on an existing StatefulSet without migration.
      # On OpenShift, prefer an RWO block storage class. Example: truenas-iscsi
      storageClass: ""

database:
  url: ""
  existingSecret:
    name: ""
    key: database-url

rbac:
  create: true

serviceAccount:
  create: true
  name: ambientor-operator
