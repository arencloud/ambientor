apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: policytranslations.ambientor.io
spec:
  group: ambientor.io
  names:
    kind: PolicyTranslation
    listKind: PolicyTranslationList
    plural: policytranslations
    singular: policytranslation
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                sourceKind:
                  type: string
                sourceName:
                  type: string
                targetKind:
                  type: string
                namespace:
                  type: string
            status:
              type: object
              properties:
                phase:
                  type: string
                suggestedManifest:
                  type: string
                warnings:
                  type: array
                  items:
                    type: string
      subresources:
        status: {}
