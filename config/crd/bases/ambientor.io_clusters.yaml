apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: clusters.ambientor.io
spec:
  group: ambientor.io
  names:
    kind: Cluster
    listKind: ClusterList
    plural: clusters
    singular: cluster
  scope: Cluster
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                displayName:
                  type: string
                meshFlavor:
                  type: string
                  enum: [UpstreamIstio, OSSM3, GenericKubernetes, Unknown]
                inCluster:
                  type: boolean
                  default: true
            status:
              type: object
              properties:
                phase:
                  type: string
                meshVersion:
                  type: string
                istioRevision:
                  type: string
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      reason:
                        type: string
                      message:
                        type: string
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Mesh
          type: string
          jsonPath: .spec.meshFlavor
        - name: Version
          type: string
          jsonPath: .status.meshVersion
        - name: Phase
          type: string
          jsonPath: .status.phase
