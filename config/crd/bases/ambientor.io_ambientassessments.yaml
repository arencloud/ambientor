apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: ambientassessments.ambientor.io
spec:
  group: ambientor.io
  names:
    kind: AmbientAssessment
    listKind: AmbientAssessmentList
    plural: ambientassessments
    singular: ambientassessment
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                inventoryRef:
                  type: string
                clusterRef:
                  type: string
            status:
              type: object
              properties:
                phase:
                  type: string
                readinessScore:
                  type: integer
                  minimum: 0
                  maximum: 100
                sidecarDependencyScore:
                  type: integer
                trafficCompatibilityScore:
                  type: integer
                overallScore:
                  type: integer
                findings:
                  type: array
                  items:
                    type: object
                    properties:
                      id:
                        type: string
                      severity:
                        type: string
                      category:
                        type: string
                      title:
                        type: string
                      message:
                        type: string
                      namespace:
                        type: string
                      resource:
                        type: string
                      remediation:
                        type: string
                      docUrl:
                        type: string
                summary:
                  type: object
                  properties:
                    blockers:
                      type: integer
                    warnings:
                      type: integer
                    info:
                      type: integer
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Score
          type: integer
          jsonPath: .status.overallScore
        - name: Blockers
          type: integer
          jsonPath: .status.summary.blockers
        - name: Phase
          type: string
          jsonPath: .status.phase
