apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: meshinventories.ambientor.io
spec:
  group: ambientor.io
  names:
    kind: MeshInventory
    listKind: MeshInventoryList
    plural: meshinventories
    singular: meshinventory
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                clusterRef:
                  type: string
                namespaceSelector:
                  type: object
                  properties:
                    matchLabels:
                      type: object
                      additionalProperties:
                        type: string
                triggerScan:
                  type: boolean
            status:
              type: object
              properties:
                phase:
                  type: string
                generation:
                  type: integer
                observedGeneration:
                  type: integer
                lastScanTime:
                  type: string
                  format: date-time
                assessmentRef:
                  type: string
      subresources:
        status: {}
