apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: rollouts.ambientor.io
spec:
  group: ambientor.io
  names:
    kind: Rollout
    listKind: RolloutList
    plural: rollouts
    singular: rollout
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                planRef:
                  type: string
                clusterRef:
                  type: string
                  description: Fleet cluster identity (from MigrationPlan when created via API).
                autoRollback:
                  type: boolean
                  default: true
                meshTarget:
                  type: object
                  properties:
                    revision:
                      type: string
                    discoveryLabel:
                      type: string
                    controlPlaneNamespace:
                      type: string
                ambientIngressGateway:
                  type: object
                  properties:
                    namespace:
                      type: string
                    name:
                      type: string
                stages:
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                      type:
                        type: string
                        enum:
                          - InstallAmbientComponents
                          - EnrollNamespace
                          - DeployWaypoint
                          - MigrateIngress
                          - LabelNamespace
                          - TranslatePolicy
                          - RollingRestart
                          - RemoveInjection
                          - VerifyTraffic
                          - DryRun
                      namespaces:
                        type: array
                        items:
                          type: string
                      requiresApproval:
                        type: boolean
                        default: true
            status:
              type: object
              properties:
                phase:
                  type: string
                currentStage:
                  type: integer
                approvedStage:
                  type: integer
                resolvedMeshTarget:
                  type: object
                  properties:
                    revision:
                      type: string
                    discoveryLabel:
                      type: string
                    controlPlaneNamespace:
                      type: string
                    version:
                      type: string
                    ambient:
                      type: boolean
                    enrolledNamespaceCount:
                      type: integer
                    enrollment:
                      type: object
                      properties:
                        mode:
                          type: string
                        revision:
                          type: string
                        discoveryLabelKey:
                          type: string
                        discoveryLabelValue:
                          type: string
                        memberRollNamespace:
                          type: string
                        fromIstiodConfig:
                          type: boolean
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      message:
                        type: string
                stageResults:
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                      phase:
                        type: string
                      message:
                        type: string
                      startedAt:
                        type: string
                        format: date-time
                      finishedAt:
                        type: string
                        format: date-time
      subresources:
        status: {}
