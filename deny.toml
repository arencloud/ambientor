[advisories]
version = 2
ignore = [
    # Transitive via openidconnect: RS256/RS* ID token signature verification with IdP public JWKS only.
    # Ambientor does not use RSA private keys; no patched rsa release (RUSTSEC-2023-0071).
    { id = "RUSTSEC-2023-0071", reason = "openidconnect JWKS verify only; no rsa private key material" },
]

[licenses]
version = 2
allow = [
    "Apache-2.0",
    "MIT",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "MPL-2.0",
    "CC0-1.0",
    # webpki-roots (reqwest/rustls via OIDC): Mozilla CA bundle data
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "warn"
