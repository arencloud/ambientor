# kind cluster for Ambientor lab validation (see docs/runbook-lab.md).
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: ambientor-lab
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      - containerPort: 80
        hostPort: 8088
        protocol: TCP
      - containerPort: 443
        hostPort: 8443
        protocol: TCP
