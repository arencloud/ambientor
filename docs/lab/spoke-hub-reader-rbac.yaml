# Deprecated filename — applies the same manifest as spoke-hub-remote-rbac.yaml.
# Kept so older docs and bookmarks keep working.
#
#   kubectl apply -f docs/lab/spoke-hub-reader-rbac.yaml
#
# Canonical copy: docs/lab/spoke-hub-remote-rbac.yaml
---
apiVersion: v1
kind: Namespace
metadata:
  name: ambientor-system
  labels:
    app.kubernetes.io/name: ambientor
    app.kubernetes.io/component: hub-remote-access
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ambientor-hub-reader
  namespace: ambientor-system
  labels:
    app.kubernetes.io/name: ambientor
    app.kubernetes.io/component: hub-remote-access
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ambientor-hub-reader
  labels:
    app.kubernetes.io/name: ambientor
    app.kubernetes.io/component: hub-remote-access
    ambientor.io/hub-access-version: v4-ztunnel-trust
rules:
  - nonResourceURLs: ["/version", "/healthz", "/livez", "/readyz"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["namespaces", "pods", "services", "configmaps"]
    verbs: ["get", "list", "watch", "create", "patch", "update", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets"]
    verbs: ["get", "list", "watch", "patch", "update", "delete"]
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "list", "watch"]
  - apiGroups:
      - networking.istio.io
      - security.istio.io
      - extensions.istio.io
      - gateway.networking.k8s.io
    resources: ["*"]
    verbs: ["get", "list", "watch", "create", "patch", "update", "delete"]
  - apiGroups: [install.istio.io, sailoperator.io, tags.istio.io, istio.io]
    resources: ["*"]
    verbs: ["get", "list", "watch", "patch", "update"]
  - apiGroups: [maistra.io]
    resources: ["servicemeshmemberrolls"]
    verbs: ["get", "list", "watch", "patch", "update"]
  - apiGroups: [operators.coreos.com]
    resources: ["subscriptions", "clusterserviceversions"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [security.openshift.io]
    resources: ["securitycontextconstraints"]
    verbs: ["get", "list"]
  - apiGroups: [route.openshift.io]
    resources: ["routes"]
    verbs: ["get", "list", "watch", "create", "patch", "update", "delete"]
  - apiGroups: [ambientor.io]
    resources: ["policytranslations"]
    verbs: ["get", "list", "watch", "create", "patch", "update", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ambientor-hub-reader
  labels:
    app.kubernetes.io/name: ambientor
    app.kubernetes.io/component: hub-remote-access
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: ambientor-hub-reader
subjects:
  - kind: ServiceAccount
    name: ambientor-hub-reader
    namespace: ambientor-system
---
apiVersion: v1
kind: Secret
metadata:
  name: ambientor-hub-reader-token
  namespace: ambientor-system
  labels:
    app.kubernetes.io/name: ambientor
    app.kubernetes.io/component: hub-remote-access
  annotations:
    kubernetes.io/service-account.name: ambientor-hub-reader
type: kubernetes.io/service-account-token
